{% extends 'base.html' %}

{% block content %}
<section class="page-header">
    <h1>Messages</h1>
</section>

{% for message in messages %}
<div class="card message-row">
    <strong>From {{ message.sender.username }}</strong>
    <p>{{ message.content }}</p>
</div>
{% else %}
<p class="empty">No messages.</p>
{% endfor %}
{% endblock %}
